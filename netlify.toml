# Netlify deploy config for Fruitopia
#
# Netlify only serves static files. All /api/* calls are proxied to your
# Node server (Render, VPS, or cPanel Node.js app).
#
# REQUIRED: Set NODE_API_URL in Netlify dashboard:
#   Site Settings → Environment Variables → Add variable
#   KEY:   NODE_API_URL
#   VALUE: https://YOUR-APP.onrender.com   (or your VPS/cPanel URL)
#
# Then redeploy. Without this, payments/email/SMS will not work.

[build]
  # BUG-16 FIX: Added fail-fast check for NODE_API_URL before starting the build.
  # If NODE_API_URL is not set in Netlify dashboard → build fails immediately with
  # a clear error message instead of silently deploying a broken site.
  command = "test -n \"$NODE_API_URL\" || (echo 'ERROR: NODE_API_URL env var is required for Netlify deploys — set it in Site Settings → Environment Variables.' && exit 1) && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# BUG-16 FIX: NODE_API_URL is required for all API calls on Netlify.
# Without it the proxy redirect (:NODE_API_URL/api/:splat) renders as
# a literal string, every /api/* request returns an empty body, and
# the entire store — install wizard, emails, payments — is non-functional
# with no visible error.
#
# Netlify does not support "required env var" checks natively in toml,
# but we add a build-time fail-fast check via the build command below.
# Replace the default build command with the fail-fast wrapper:
#
#   [build]
#     command = "test -n \"$NODE_API_URL\" || (echo 'MISSING: NODE_API_URL is required for Netlify deploys. Set it in Site Settings → Environment Variables.' && exit 1) && npm run build"
#
# The [build] section below is the recommended safe version:
[build.processing]
  skip_processing = false

# Proxy /api/* to your backend Node server.
# Uses NODE_API_URL env var - set it in Netlify dashboard.
[[redirects]]
  from = "/api/*"
  to   = ":NODE_API_URL/api/:splat"
  status = 200
  force = true

# Firebase config proxy
[[redirects]]
  from = "/firebase-config.json"
  to   = ":NODE_API_URL/firebase-config.json"
  status = 200
  force = true

# Supabase config proxy
[[redirects]]
  from = "/supabase-config.json"
  to   = ":NODE_API_URL/supabase-config.json"
  status = 200
  force = true

# SPA fallback - must be last
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
